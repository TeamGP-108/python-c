<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Python Terminal</title>

<!-- CodeMirror for VS Code-like editor -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/theme/dracula.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/python/python.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/edit/closebrackets.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/edit/matchbrackets.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/comment/comment.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/selection/active-line.min.js"></script>

<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #1e1e1e;
    color: #d4d4d4;
    font-family: 'Fira Code', 'Cascadia Code', 'Consolas', monospace;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── Top bar ── */
  .topbar {
    background: #323233;
    border-bottom: 1px solid #111;
    padding: 0 14px;
    height: 38px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
  }

  .dots { display: flex; gap: 6px; }
  .dot  { width: 11px; height: 11px; border-radius: 50%; }
  .dot.r { background: #ff5f57; }
  .dot.y { background: #ffbd2e; }
  .dot.g { background: #28c840; }

  .file-tab {
    background: #1e1e1e;
    border-top: 2px solid #0078d4;
    padding: 0 16px;
    height: 38px;
    display: flex;
    align-items: center;
    font-size: 13px;
    color: #ccc;
    gap: 6px;
  }
  .file-tab span { color: #888; font-size: 11px; }

  /* ── Main split layout ── */
  .main {
    display: flex;
    flex-direction: column;
    flex: 1;
    overflow: hidden;
  }

  /* ── Editor panel ── */
  .editor-panel {
    flex: 1;
    min-height: 0;
    position: relative;
    border-bottom: 1px solid #111;
  }

  .CodeMirror {
    height: 100% !important;
    font-family: 'Fira Code', 'Cascadia Code', 'Consolas', monospace !important;
    font-size: 14px !important;
    line-height: 1.6 !important;
    background: #1e1e1e !important;
  }

  .CodeMirror-scroll { padding-bottom: 20px; }

  /* ── Action bar ── */
  .actionbar {
    background: #2d2d2d;
    border-bottom: 1px solid #111;
    padding: 6px 14px;
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
  }

  #run-btn {
    background: #0078d4;
    color: #fff;
    border: none;
    border-radius: 4px;
    padding: 5px 16px;
    font-size: 13px;
    font-family: inherit;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: background 0.15s;
  }
  #run-btn:hover    { background: #1084d8; }
  #run-btn:disabled { background: #444; color: #777; cursor: not-allowed; }

  #clear-btn {
    background: transparent;
    color: #888;
    border: 1px solid #444;
    border-radius: 4px;
    padding: 5px 14px;
    font-size: 13px;
    font-family: inherit;
    cursor: pointer;
    transition: color 0.15s;
  }
  #clear-btn:hover { color: #ccc; border-color: #666; }

  #status {
    margin-left: auto;
    font-size: 12px;
    color: #666;
    min-width: 100px;
    text-align: right;
  }
  #status.running { color: #4ec9b0; }
  #status.error   { color: #f44747; }
  #status.done    { color: #6a9955; }

  /* ── Terminal panel ── */
  .terminal-panel {
    flex: 0 0 240px;
    background: #0d0d0d;
    overflow-y: auto;
    padding: 10px 14px;
    font-family: 'Fira Code', 'Cascadia Code', 'Consolas', monospace;
    font-size: 13.5px;
    line-height: 1.75;
  }

  .terminal-panel::-webkit-scrollbar       { width: 6px; }
  .terminal-panel::-webkit-scrollbar-track { background: #0d0d0d; }
  .terminal-panel::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }

  /* each line is a block element so they stack vertically */
  .out-line {
    display: block;
    white-space: pre;          /* preserve spaces but DON'T wrap into same line */
    word-break: break-all;
  }

  .out-line.stdout { color: #d4d4d4; }
  .out-line.stderr { color: #f44747; }
  .out-line.info   { color: #555; font-style: italic; }

  /* blinking cursor */
  #cursor {
    display: inline-block;
    width: 7px;
    height: 13px;
    background: #4ec9b0;
    vertical-align: middle;
    animation: blink 1s step-end infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

  /* terminal header */
  .term-header {
    background: #1a1a1a;
    border-bottom: 1px solid #222;
    padding: 4px 14px;
    font-size: 11px;
    color: #555;
    letter-spacing: 0.05em;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .term-header span { color: #333; }
</style>
</head>
<body>

<!-- Top bar -->
<div class="topbar">
  <div class="dots">
    <div class="dot r"></div>
    <div class="dot y"></div>
    <div class="dot g"></div>
  </div>
  <div class="file-tab">main.py <span>●</span></div>
</div>

<!-- Editor -->
<div class="main">
  <div class="editor-panel">
    <textarea id="code-input">for i in range(5):
    print(f"Hello {i}")</textarea>
  </div>

  <!-- Run bar -->
  <div class="actionbar">
    <button id="run-btn">▶ Run</button>
    <button id="clear-btn">⊘ Clear</button>
    <kbd style="font-size:11px;color:#555;border:1px solid #444;padding:2px 6px;border-radius:3px;">Ctrl+Enter</kbd>
    <span id="status">ready</span>
  </div>

  <!-- Terminal header -->
  <div class="term-header">TERMINAL <span>─────────────────────</span> python3</div>

  <!-- Output terminal -->
  <div class="terminal-panel" id="terminal">
    <span class="out-line info">// output appears here line by line...</span>
  </div>
</div>

<script>
  const API = "https://python-c.vercel.app/run";

  // ── Init CodeMirror ──────────────────────────────────────────
  const cm = CodeMirror.fromTextArea(document.getElementById("code-input"), {
    mode:              "python",
    theme:             "dracula",
    lineNumbers:       true,
    autoCloseBrackets: true,
    matchBrackets:     true,
    styleActiveLine:   true,
    indentUnit:        4,
    tabSize:           4,
    indentWithTabs:    false,
    extraKeys: {
      "Tab": (cm) => cm.execCommand("indentMore"),
      "Shift-Tab": (cm) => cm.execCommand("indentLess"),
      "Ctrl-/": (cm) => cm.toggleComment(),
      "Ctrl-Enter": () => runCode(),
    }
  });

  // ── Terminal helpers ─────────────────────────────────────────
  const terminal = document.getElementById("terminal");
  const runBtn   = document.getElementById("run-btn");
  const clearBtn = document.getElementById("clear-btn");
  const statusEl = document.getElementById("status");

  let cursorEl = null;

  function addCursor() {
    cursorEl = document.createElement("span");
    cursorEl.id = "cursor";
    terminal.appendChild(cursorEl);
    scrollBottom();
  }

  function removeCursor() {
    if (cursorEl) { cursorEl.remove(); cursorEl = null; }
  }

  function scrollBottom() {
    terminal.scrollTop = terminal.scrollHeight;
  }

  // Append one line to terminal — each call = one new visual row
  function appendLine(text, type) {
    removeCursor();
    const el = document.createElement("span");
    el.className = `out-line ${type}`;
    el.textContent = text;   // textContent safely renders \n etc.
    terminal.appendChild(el);
    addCursor();
    scrollBottom();
  }

  function setStatus(text, cls) {
    statusEl.textContent = text;
    statusEl.className   = cls;
  }

  clearBtn.addEventListener("click", () => {
    terminal.innerHTML = "";
    setStatus("ready", "");
  });

  // ── Run ──────────────────────────────────────────────────────
  async function runCode() {
    const code = cm.getValue().trim();
    if (!code) return;

    terminal.innerHTML = "";
    addCursor();
    runBtn.disabled = true;
    setStatus("● running", "running");

    try {
      const url = `${API}?code=${encodeURIComponent(code)}&format=stream`;
      const response = await fetch(url);

      if (!response.ok) {
        appendLine(`HTTP error: ${response.status}`, "stderr");
        return;
      }

      const reader  = response.body.getReader();
      const decoder = new TextDecoder();
      let   buffer  = "";

      while (true) {
        const { value, done } = await reader.read();
        if (done) break;

        buffer += decoder.decode(value, { stream: true });

        // SSE blocks are separated by \n\n
        const blocks = buffer.split("\n\n");
        buffer = blocks.pop();  // last incomplete block stays in buffer

        for (const block of blocks) {
          if (!block.trim()) continue;

          let event = "stdout";
          let data  = "";

          for (const line of block.split("\n")) {
            if (line.startsWith("event: ")) event = line.slice(7).trim();
            if (line.startsWith("data: "))  data  = line.slice(6);
          }

          if (event === "done") {
            const payload  = JSON.parse(data);
            const exitCode = payload.exit_code;
            removeCursor();
            appendLine(`[Process exited with code ${exitCode}]`, exitCode === 0 ? "info" : "stderr");
            removeCursor();
            setStatus(exitCode === 0 ? "✓ done" : `✗ exit ${exitCode}`, exitCode === 0 ? "done" : "error");

          } else {
            // data may contain multiple lines if buffered — split and emit each
            const lines = data.split("\n");
            for (let i = 0; i < lines.length; i++) {
              // last element is "" if data ended with \n — skip empty tail
              if (i === lines.length - 1 && lines[i] === "") continue;
              appendLine(lines[i], event);
            }
          }
        }
      }

    } catch (err) {
      removeCursor();
      appendLine(`Fetch error: ${err.message}`, "stderr");
      setStatus("✗ error", "error");
    } finally {
      runBtn.disabled = false;
    }
  }

  document.getElementById("run-btn").addEventListener("click", runCode);
</script>
</body>
</html>
